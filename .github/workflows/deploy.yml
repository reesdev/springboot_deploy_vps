name: CI/CD - Build & Deploy

concurrency:
  group: deploy-mentor
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: spring-app-mentor
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      APP_DIR: /home/backend/spring-app/mentor

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build application
        run: ./mvnw -B clean package -DskipTests

      # 🐳 Docker Login
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🐳 Build & Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      # 📦 Copy compose
      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "${{ env.APP_DIR }}"
          overwrite: true

      # 🚀 DEPLOY ON VPS (PULL & RUN ONLY)
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ env.APP_DIR }}
            echo "🚀 Starting deployment..."

            echo "📥 Pulling latest image..."
            docker compose pull

            echo "🔄 Restarting services..."
            docker compose down
            docker compose up -d

            echo "⏳ Waiting for health check..."
            sleep 30

            # Verify deployment
            if docker compose ps | grep -q "Up"; then
              echo "✅ Deployment completed successfully!"
              docker compose ps
            else
              echo "❌ Deployment failed!"
              docker compose logs
              exit 1
            fi
