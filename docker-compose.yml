version: "3.9"

services:
  reesky-student1:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME}/reesky-student1:latest
    container_name: reesky-student1
    ports:
      - "${APP_PORT:-9001}:${APP_PORT:-9001}"
    env_file:
      - .env
    environment:
      - SERVER_PORT=${APP_PORT:-9001}
      - SPRING_DATASOURCE_URL=jdbc:mysql://reesky-mysql:3306/db_spring_student1
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}
    restart: always

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://localhost:${APP_PORT:-9001}/actuator/health || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    depends_on:
      - reesky-mysql

    networks:
      - student1_net

  reesky-mysql:
    image: mysql:8.0
    container_name: reesky-mysql
    restart: always
    environment:
      - MYSQL_DATABASE=db_spring_student1
      - MYSQL_USER=backend
      - MYSQL_PASSWORD=rahasia_banget
    ports:
      - "3307:3306"
    volumes:
      - reesky_mysql_data:/var/lib/mysql
    networks:
      - be_classroom_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

volumes:
  reesky_mysql_data:

networks:
  student1_net:
    driver: bridge